<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="daily-blitz-seasons — тренажёр устного счёта с ежедневной практикой, серией дней и сезонными карточками.">
<title>daily-blitz-seasons — тренажёр устного счёта</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="flash" id="flash"></div>

<div class="timesup-overlay" id="timesup-overlay">
  <div class="timesup-title">ВРЕМЯ!</div>
  <div class="timesup-stats" id="timesup-stats"></div>
</div>

<!-- ════════ MENU ════════ -->
<div class="screen active" id="screen-menu">
  <h1 class="logo">daily<span>-</span>blitz<span>-</span>seasons</h1>
  <div class="tagline">скорость мышления</div>

  <div class="section-label">сегодня</div>
  <div class="today-block" id="today-block">
    <div class="today-weekday" id="today-weekday"></div>
    <div class="today-full-date" id="today-full-date"></div>
    <div class="season-card" id="season-card">
      <div class="season-icon" id="season-icon"></div>
      <div class="season-info">
        <div class="season-name" id="season-name"></div>
        <div class="season-months" id="season-months"></div>
      </div>
    </div>
    <div class="today-meta-row">
      <div class="quarter-badge" id="quarter-badge"></div>
      <div class="daily-streak-badge" id="daily-streak-badge"></div>
    </div>
    <div class="today-stats" id="today-stats"></div>
    <button class="today-start-btn" id="today-start-btn" type="button">Начать тренировку на сегодня</button>
  </div>

  <div class="section-label">операция</div>
  <div class="menu-grid">
    <button class="op-btn selected" data-op="×" type="button"><span class="op-symbol">×</span>умножение</button>
    <button class="op-btn" data-op="÷" type="button"><span class="op-symbol">÷</span>деление</button>
    <button class="op-btn" data-op="+" type="button"><span class="op-symbol">+</span>сложение</button>
    <button class="op-btn" data-op="−" type="button"><span class="op-symbol">−</span>вычитание</button>
  </div>

  <div class="section-label">числа и подсказка</div>
  <div class="settings-row">
    <label class="select-field">
      <span>диапазон</span>
      <select id="range-select">
        <option value="10" selected>1–10</option>
        <option value="12">1–12</option>
        <option value="20">1–20</option>
        <option value="25">1–25</option>
        <option value="50">1–50</option>
        <option value="100">1–100</option>
      </select>
    </label>
    <label class="select-field">
      <span>тренировать</span>
      <select id="focus-select"></select>
    </label>
  </div>
  <div class="toggle-stack">
    <div class="toggle-row">
      <label for="guide-toggle">
        <input id="guide-toggle" type="checkbox" checked>
        показывать готовые ответы
      </label>
      <div class="toggle-hint">справа в игре</div>
    </div>
  </div>

  <div class="settings-row">
    <label class="select-field">
      <span>порядок вопросов</span>
      <select id="sequence-mode-select">
        <option value="random" selected>всегда случайно</option>
        <option value="ordered-first">сначала по порядку, потом случайно</option>
        <option value="ordered">всегда по порядку</option>
      </select>
    </label>
  </div>

  <div class="section-label">режим игры</div>
  <div class="game-mode-grid">
    <button class="gm-btn selected" data-gm="classic" type="button">
      <span class="gm-icon">📋</span>классика<span class="gm-sub">N вопросов</span>
    </button>
    <button class="gm-btn" data-gm="timed" type="button">
      <span class="gm-icon">⏱</span>на время<span class="gm-sub">успей за T сек</span>
    </button>
    <button class="gm-btn" data-gm="survival" type="button">
      <span class="gm-icon">∞</span>выживание<span class="gm-sub">максимум за T</span>
    </button>
  </div>

  <div class="mode-options" id="opts-classic">
    <div class="section-label">количество вопросов</div>
    <div class="sub-grid">
      <button class="sub-btn" data-val="10" type="button">10</button>
      <button class="sub-btn selected" data-val="20" type="button">20</button>
      <button class="sub-btn" data-val="30" type="button">30</button>
      <button class="sub-btn" data-val="50" type="button">50</button>
      <button class="sub-btn" data-val="100" type="button">100</button>
    </div>
  </div>

  <div class="mode-options" id="opts-timed" style="display:none">
    <div class="section-label">время на сессию</div>
    <div class="sub-grid">
      <button class="sub-btn" data-val="30" type="button">30 сек</button>
      <button class="sub-btn selected" data-val="60" type="button">1 мин</button>
      <button class="sub-btn" data-val="120" type="button">2 мин</button>
      <button class="sub-btn" data-val="180" type="button">3 мин</button>
      <button class="sub-btn" data-val="300" type="button">5 мин</button>
    </div>
  </div>

  <div class="mode-options" id="opts-survival" style="display:none">
    <div class="section-label">лимит времени</div>
    <div class="sub-grid">
      <button class="sub-btn" data-val="60" type="button">1 мин</button>
      <button class="sub-btn selected" data-val="120" type="button">2 мин</button>
      <button class="sub-btn" data-val="180" type="button">3 мин</button>
      <button class="sub-btn" data-val="300" type="button">5 мин</button>
    </div>
  </div>

  <div class="section-label">ввод ответа</div>
  <div class="input-mode-row">
    <button class="mode-btn" data-mode="keyboard" type="button">⌨ клавиатура</button>
    <button class="mode-btn selected" data-mode="choices" type="button">☰ варианты</button>
    <button class="mode-btn" data-mode="screen" type="button">📱 экран</button>
  </div>

  <button class="start-btn" id="start-btn" type="button">СТАРТ →</button>
</div>

<!-- ════════ GAME ════════ -->
<div class="screen" id="screen-game">
  <div class="game-shell">
    <main class="game-main">
      <div class="game-header">
        <div class="streak">серия: <span id="streak-count">0</span></div>
        <div style="display:flex;gap:12px;align-items:center;">
          <div style="font-family:var(--mono);font-size:0.7rem;color:var(--muted);">
            ✓<span id="score-correct" style="color:var(--accent3);margin-left:3px">0</span>
            &nbsp;✗<span id="score-wrong" style="color:var(--accent2);margin-left:3px">0</span>
          </div>
          <button class="quit-btn" id="quit-btn" type="button">✕ выход</button>
        </div>
      </div>

      <div class="timer-row" id="timer-row" style="display:none">
        <div class="timer-display" id="timer-display">60</div>
        <div class="timer-bar-wrap">
          <div class="timer-bar-fill" id="timer-bar-fill" style="width:100%"></div>
        </div>
        <div class="qcount-display" id="qcount-display"></div>
      </div>

      <div class="progress-bar" id="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>

      <div class="question-box" id="question-box">
        <div class="question-text" id="question-text">?</div>
        <div class="question-answer" id="question-answer"></div>
        <div class="typed-input-display" id="typed-display" style="display:none">
          <span id="typed-value"></span><span class="typed-cursor"></span>
        </div>
      </div>

      <div class="keyboard-hint" id="keyboard-hint" style="display:none">цифры · Enter → ответ · Backspace → стереть</div>

      <div class="choices-grid" id="choices-grid" style="display:none">
        <button class="choice-btn" id="c0" data-choice-idx="0" type="button"></button>
        <button class="choice-btn" id="c1" data-choice-idx="1" type="button"></button>
        <button class="choice-btn" id="c2" data-choice-idx="2" type="button"></button>
        <button class="choice-btn" id="c3" data-choice-idx="3" type="button"></button>
      </div>

      <div class="screen-keyboard" id="screen-keyboard" style="display:none">
        <div class="sk-row">
          <button class="sk-btn" data-sk-key="7" type="button">7</button>
          <button class="sk-btn" data-sk-key="8" type="button">8</button>
          <button class="sk-btn" data-sk-key="9" type="button">9</button>
        </div>
        <div class="sk-row">
          <button class="sk-btn" data-sk-key="4" type="button">4</button>
          <button class="sk-btn" data-sk-key="5" type="button">5</button>
          <button class="sk-btn" data-sk-key="6" type="button">6</button>
        </div>
        <div class="sk-row">
          <button class="sk-btn" data-sk-key="1" type="button">1</button>
          <button class="sk-btn" data-sk-key="2" type="button">2</button>
          <button class="sk-btn" data-sk-key="3" type="button">3</button>
        </div>
        <div class="sk-row">
          <button class="sk-btn" data-sk-key="back" type="button">⌫</button>
          <button class="sk-btn" data-sk-key="0" type="button">0</button>
          <button class="sk-btn sk-enter" data-sk-key="enter" type="button">OK</button>
        </div>
      </div>
    </main>

    <aside class="practice-guide" id="practice-guide" aria-live="polite"></aside>
  </div>
</div>

<!-- ════════ SCORE ════════ -->
<div class="screen" id="screen-score">
  <div class="score-title" id="score-mode-label">итого</div>
  <div class="score-number" id="final-score">0</div>
  <div class="score-sub" id="final-sub"></div>
  <div class="score-time-display" id="final-time" style="display:none"></div>
  <div class="score-date-display" id="final-date"></div>
  <div class="score-sub" id="final-streak"></div>
  <div class="score-sub" id="final-daily-streak"></div>
  <div class="score-actions">
    <button class="score-btn" id="menu-btn" type="button">меню</button>
    <button class="score-btn primary" id="restart-btn" type="button">ещё раз</button>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
