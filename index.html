<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="daily-blitz-seasons — тренажёр кварталов и сезонов. Быстро понимай, в каком квартале анонс, отчёт или релиз, и какой месяц к какому сезону относится.">
<title>daily-blitz-seasons — кварталы и сезоны</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="flash" id="flash"></div>

<div class="timesup-overlay" id="timesup-overlay">
  <div class="timesup-title">ВРЕМЯ!</div>
  <div class="timesup-stats" id="timesup-stats"></div>
</div>

<!-- ════════ MENU ════════ -->
<div class="screen active" id="screen-menu">
  <h1 class="logo">daily<span>-</span>blitz<span>-</span>seasons</h1>
  <div class="tagline">кварталы · сезоны · даты</div>

  <div class="section-label">сегодня</div>
  <div class="today-block" id="today-block">
    <div class="today-date-head">
      <div class="today-weekday" id="today-weekday"></div>
      <div class="today-full-date" id="today-full-date"></div>
    </div>
    <div class="season-card" id="season-card">
      <div class="season-icon" id="season-icon"></div>
      <div class="season-info">
        <div class="season-name" id="season-name"></div>
        <div class="season-months" id="season-months"></div>
      </div>
    </div>
    <div class="today-meta-row">
      <div class="quarter-group" id="quarter-group">
        <div class="quarter-badge" id="quarter-badge"></div>
        <div class="quarter-detail" id="quarter-detail"></div>
      </div>
      <div class="daily-streak-badge" id="daily-streak-badge"></div>
    </div>
    <div class="today-stats" id="today-stats"></div>
    <button class="today-start-btn" id="today-start-btn" type="button">Тренировка на сегодня</button>
  </div>

  <div class="section-label">календарь года</div>
  <div class="year-calendar" id="year-calendar" aria-label="Календарь года по сезонам и кварталам"></div>

  <div class="section-label">тренажёр</div>
  <div class="trainer-grid">
    <button class="trainer-btn selected" data-trainer="seasons" type="button">
      <span class="trainer-icon">🌿</span>
      <span class="trainer-name">Сезоны</span>
      <span class="trainer-sub">месяц → зима, весна, лето, осень</span>
    </button>
    <button class="trainer-btn" data-trainer="quarters" type="button">
      <span class="trainer-icon">📊</span>
      <span class="trainer-name">Кварталы</span>
      <span class="trainer-sub">Q1–Q4, отчёты и анонсы</span>
    </button>
    <button class="trainer-btn" data-trainer="mixed" type="button">
      <span class="trainer-icon">⚡</span>
      <span class="trainer-name">Смешанный</span>
      <span class="trainer-sub">сезоны и кварталы вместе</span>
    </button>
  </div>

  <div class="section-label">настройки</div>
  <div class="game-mode-grid">
    <button class="gm-btn selected" data-gm="classic" type="button">
      <span class="gm-icon">📋</span>классика<span class="gm-sub">N вопросов</span>
    </button>
    <button class="gm-btn" data-gm="timed" type="button">
      <span class="gm-icon">⏱</span>на время<span class="gm-sub">успей за T сек</span>
    </button>
  </div>

  <div class="mode-options" id="opts-classic">
    <div class="section-label">количество вопросов</div>
    <div class="sub-grid">
      <button class="sub-btn" data-val="10" type="button">10</button>
      <button class="sub-btn selected" data-val="15" type="button">15</button>
      <button class="sub-btn" data-val="20" type="button">20</button>
      <button class="sub-btn" data-val="30" type="button">30</button>
    </div>
  </div>

  <div class="mode-options" id="opts-timed" style="display:none">
    <div class="section-label">время на сессию</div>
    <div class="sub-grid">
      <button class="sub-btn" data-val="45" type="button">45 сек</button>
      <button class="sub-btn selected" data-val="60" type="button">1 мин</button>
      <button class="sub-btn" data-val="90" type="button">90 сек</button>
      <button class="sub-btn" data-val="120" type="button">2 мин</button>
    </div>
  </div>

  <div class="toggle-stack">
    <div class="toggle-row">
      <label for="guide-toggle">
        <input id="guide-toggle" type="checkbox" checked>
        показывать справочник
      </label>
      <div class="toggle-hint">справа в тренировке</div>
    </div>
  </div>

  <button class="start-btn" id="start-btn" type="button">СТАРТ →</button>

  <p class="menu-hint">Когда слышишь «релиз в Q3» или «отчёт за прошлый квартал» — сразу понимаешь, о каких месяцах речь.</p>
</div>

<!-- ════════ GAME ════════ -->
<div class="screen" id="screen-game">
  <div class="game-shell">
    <main class="game-main">
      <div class="game-header">
        <div class="trainer-label" id="trainer-label">сезоны</div>
        <div class="game-header-right">
          <div class="hud-stats">
            серия <span id="streak-count">0</span>
            · ✓<span id="score-correct">0</span>
            · ✗<span id="score-wrong">0</span>
          </div>
          <button class="quit-btn" id="quit-btn" type="button">✕ выход</button>
        </div>
      </div>

      <div class="timer-row" id="timer-row" style="display:none">
        <div class="timer-display" id="timer-display">60</div>
        <div class="timer-bar-wrap">
          <div class="timer-bar-fill" id="timer-bar-fill" style="width:100%"></div>
        </div>
        <div class="qcount-display" id="qcount-display"></div>
      </div>

      <div class="progress-bar" id="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>

      <div class="question-box" id="question-box">
        <div class="question-context" id="question-context"></div>
        <div class="question-text" id="question-text">?</div>
        <div class="question-answer" id="question-answer"></div>
      </div>

      <div class="choices-grid" id="choices-grid">
        <button class="choice-btn" id="c0" data-choice-idx="0" type="button"></button>
        <button class="choice-btn" id="c1" data-choice-idx="1" type="button"></button>
        <button class="choice-btn" id="c2" data-choice-idx="2" type="button"></button>
        <button class="choice-btn" id="c3" data-choice-idx="3" type="button"></button>
      </div>
    </main>

    <aside class="reference-panel" id="reference-panel" aria-live="polite"></aside>
  </div>
</div>

<!-- ════════ SCORE ════════ -->
<div class="screen" id="screen-score">
  <div class="score-title" id="score-mode-label">итого</div>
  <div class="score-number" id="final-score">0</div>
  <div class="score-sub" id="final-sub"></div>
  <div class="score-time-display" id="final-time" style="display:none"></div>
  <div class="score-date-display" id="final-date"></div>
  <div class="score-sub" id="final-streak"></div>
  <div class="score-sub" id="final-daily-streak"></div>
  <div class="score-actions">
    <button class="score-btn" id="menu-btn" type="button">меню</button>
    <button class="score-btn primary" id="restart-btn" type="button">ещё раз</button>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
